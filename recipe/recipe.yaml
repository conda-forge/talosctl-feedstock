schema_version: 1

context:
  version: "1.13.7"

package:
  name: talosctl
  version: ${{ version }}

source:
  url: https://github.com/siderolabs/talos/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 2694a289d868ecb5ab2b0fcfbf61c452dfbc6540fab1c6b49f52d451755b5c8a

build:
  number: 0
  script:
    interpreter: nu
    content: |
      # Talos pins `go 1.26.5` across its go.mod / go.work (including nested modules),
      # but the build toolchain is older; relax every pin to a version it satisfies.
      [(glob go.mod) (glob **/go.mod) (glob go.work) (glob **/go.work)]
      | flatten
      | uniq
      | each {|f|
          open --raw $f
          | decode utf-8
          | str replace --regex --all '(?m)^go 1\.26\.[0-9]+' 'go 1.26.2'
          | save --force $f
      }

      # Windows lands the binary in Library\bin with an .exe suffix; unix uses $PREFIX/bin.
      let bin = if $nu.os-info.name == "windows" {
          $"($env.LIBRARY_BIN)/talosctl.exe"
      } else {
          $"($env.PREFIX)/bin/talosctl"
      }

      # GOWORK=off builds in module mode using the go.mod replace directives.
      with-env {GOWORK: "off"} {
          go build -v -o $bin -ldflags $"-s -w -X github.com/siderolabs/talos/pkg/machinery/version.Tag=v($env.PKG_VERSION)" ./cmd/talosctl
      }

      # Collect statically-linked dependency licenses for the package.
      go-licenses save ./cmd/talosctl --save_path ./library-licenses --ignore github.com/siderolabs/talos

requirements:
  build:
    - ${{ compiler('go-nocgo') }}
    - go-licenses
    - nushell

tests:
  - package_contents:
      bin:
        - talosctl

about:
  homepage: https://github.com/talosctl/talosctl
  summary: "Talos Linux is an OS for Kubernetes"
  description: |
    Talos is a modern OS for running Kubernetes: secure, immutable, and minimal.
    Talos is fully open source.
    All system management is done via an API.
    `talosctl` is a command line tool which uses that API.
  license: MPL-2.0
  license_file:
    - LICENSE
    - library-licenses/
  documentation: https://docs.siderolabs.com/talos
  repository: https://github.com/siderolabs/talos

extra:
  recipe-maintainers:
    - phreed
